name: CI

# Build + deploy pipeline for master:
#
#   push ──► image-smoke (build the real Docker images + boot them)  ◄ the gate
#             ├─► backend-image  ┐  push to GHCR (:latest + :sha-<commit>,
#             └─► storefront-image┘  GIT_SHA baked into the image)
#                   └─► deploy (railway redeploy --from-source, then WAIT until
#                       prod /version + /api/healthcheck report the new commit)
#                         └─► e2e-prod (read-only Playwright against LIVE prod)
#
# e2e now runs AFTER the deploy, validating the live site — it is no longer a
# pre-merge gate. PRs run only image-smoke (build + boot the pruned production
# images), which catches runtime deps misfiled as devDependencies. The image
# push + deploy + e2e-prod jobs run on push to master only. image-smoke uses an
# ephemeral CI Postgres (no secrets, never touches prod); prod e2e is strictly
# read-only and authenticates through the access-token gate. See
# .github/workflows/README.md.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; image jobs opt into packages:write.
permissions:
  contents: read

jobs:
  # Detect which app changed so single-app pushes skip the other app's heavy
  # image build / boot / redeploy. image-smoke always RUNS (the gate), but does
  # only the changed app's work, and the image-push + deploy + e2e-prod jobs are
  # per-app. A change to ci.yml counts as both apps.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      storefront: ${{ steps.filter.outputs.storefront }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            storefront:
              - 'storefront/**'
              - '.github/workflows/ci.yml'

  # ── Image boot smoke test ────────────────────────────────────────────────
  # The pre-push gate. Builds the ACTUAL Docker images and boots them, asserting
  # the backend serves /health and the storefront serves on its port. Booting the
  # pruned production images catches runtime deps misfiled under devDependencies
  # (e.g. react for the email templates, ansi-colors for next.config) that a
  # source build would miss. Runs on PRs + master; gates the image push + deploy.
  image-smoke:
    name: Image boot smoke test
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build the backend image locally (shares the gha cache scope with the
      # backend-image push job, so that job rebuilds from cache, not from zero).
      - name: Build backend image
        if: needs.changes.outputs.backend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: backend
          load: true
          tags: backend:smoke
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          # Same build-arg as the push job so this job's cached `pnpm build` layer
          # is reused there (the arg is part of the layer cache key). Value matches
          # the push job; smoke only asserts /health, so the baked URL is moot here.
          build-args: |
            BACKEND_PUBLIC_URL=${{ vars.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
            GIT_SHA=${{ github.sha }}

      - name: Create smoke database
        if: needs.changes.outputs.backend == 'true'
        run: |
          export PGPASSWORD=postgres
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 \
            -c "CREATE DATABASE smoke_db;"

      # Pre-migrate so init-backend's checkIfSeeded sees the schema and SKIPS
      # seeding — mirroring production's already-seeded boot path (the path that
      # runs `cd .medusa/server && medusa db:migrate && medusa start`). sslmode is
      # disabled because the CI Postgres has no SSL (prod's does).
      - name: Pre-migrate the smoke database
        if: needs.changes.outputs.backend == 'true'
        env:
          SMOKE_DB_URL: postgres://postgres:postgres@localhost:5432/smoke_db?sslmode=disable
        run: |
          docker run --rm --network host \
            -e DATABASE_URL="$SMOKE_DB_URL" \
            -e JWT_SECRET=smoke -e COOKIE_SECRET=smoke \
            -e MOLONI_CLIENT_ID=dummy -e MOLONI_CLIENT_SECRET=dummy \
            -e MOLONI_USER=dummy -e MOLONI_PASSWORD=dummy -e MOLONI_COMPANY_ID=1 \
            -w /app/.medusa/server --entrypoint sh backend:smoke \
            -c "./node_modules/.bin/medusa db:migrate"

      - name: Boot backend image and assert /health
        if: needs.changes.outputs.backend == 'true'
        env:
          SMOKE_DB_URL: postgres://postgres:postgres@localhost:5432/smoke_db?sslmode=disable
        run: |
          docker run -d --name backend-smoke --network host \
            -e DATABASE_URL="$SMOKE_DB_URL" \
            -e JWT_SECRET=smoke -e COOKIE_SECRET=smoke \
            -e MEDUSA_ADMIN_EMAIL=admin@smoke.test -e MEDUSA_ADMIN_PASSWORD=supersecret123 \
            -e STORE_CORS=http://localhost:8000 \
            -e ADMIN_CORS=http://localhost:9000 \
            -e AUTH_CORS=http://localhost:9000 \
            -e MOLONI_CLIENT_ID=dummy -e MOLONI_CLIENT_SECRET=dummy \
            -e MOLONI_USER=dummy -e MOLONI_PASSWORD=dummy -e MOLONI_COMPANY_ID=1 \
            backend:smoke
          echo "Waiting for backend image health…"
          npx --yes wait-on -t 180000 http://localhost:9000/health
          echo "Backend image booted healthy."

      - name: Backend image logs on failure
        if: failure() && needs.changes.outputs.backend == 'true'
        run: docker logs backend-smoke 2>&1 | tail -n 200 || true

      # Storefront: build args are inlined by `next build`; values are dummy
      # because we only assert the server boots (next.config -> check-env-variables
      # must resolve its runtime deps in the pruned image). The backend booted
      # above is reachable at localhost:9000 for any on-demand rendering.
      - name: Build storefront image
        if: needs.changes.outputs.storefront == 'true'
        uses: docker/build-push-action@v6
        with:
          context: storefront
          load: true
          tags: storefront:smoke
          cache-from: type=gha,scope=storefront
          cache-to: type=gha,mode=max,scope=storefront
          build-args: |
            NEXT_PUBLIC_MEDUSA_BACKEND_URL=http://localhost:9000
            NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=pk_smoke_dummy
            NEXT_PUBLIC_BASE_URL=http://localhost:8000
            NEXT_PUBLIC_DEFAULT_REGION=dk

      - name: Boot storefront image and assert it serves
        if: needs.changes.outputs.storefront == 'true'
        run: |
          docker run -d --name storefront-smoke --network host \
            -e PORT=8000 storefront:smoke
          echo "Waiting for storefront to listen…"
          npx --yes wait-on -t 120000 tcp:127.0.0.1:8000
          # Any HTTP status (even an error page) proves `next start` booted;
          # 000 means the process crashed (e.g. a pruned runtime dep).
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 || echo 000)
          echo "storefront / -> HTTP $code"
          test "$code" != "000"

      - name: Storefront image logs on failure
        if: failure() && needs.changes.outputs.storefront == 'true'
        run: docker logs storefront-smoke 2>&1 | tail -n 200 || true

  # ── Backend image ──────────────────────────────────────────────────────────
  backend-image:
    name: Build + push backend image
    needs: [changes, image-smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          # Bakes the admin dashboard's API base URL. Without it the admin calls
          # http://localhost:9000 and login fails in production. = the backend's
          # public URL (https://storeadmin.higitotal.pt).
          build-args: |
            BACKEND_PUBLIC_URL=${{ vars.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
            GIT_SHA=${{ github.sha }}

  # ── Storefront image ─────────────────────────────────────────────────────
  storefront-image:
    name: Build + push storefront image
    needs: [changes, image-smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && needs.changes.outputs.storefront == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/storefront
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: storefront
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=storefront
          cache-to: type=gha,mode=max,scope=storefront
          # NEXT_PUBLIC_* are inlined at build time → must match production. Set
          # these as repo-level Actions *Variables* (Settings → Secrets and
          # variables → Actions → Variables); they are public values, not secrets.
          # Missing NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY fails the build by design.
          build-args: |
            NEXT_PUBLIC_MEDUSA_BACKEND_URL=${{ vars.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
            NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${{ vars.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_BASE_URL=${{ vars.NEXT_PUBLIC_BASE_URL }}
            NEXT_PUBLIC_DEFAULT_REGION=${{ vars.NEXT_PUBLIC_DEFAULT_REGION }}
            NEXT_PUBLIC_MINIO_ENDPOINT=${{ vars.NEXT_PUBLIC_MINIO_ENDPOINT }}
            NEXT_PUBLIC_SEARCH_ENDPOINT=${{ vars.NEXT_PUBLIC_SEARCH_ENDPOINT }}
            NEXT_PUBLIC_SEARCH_API_KEY=${{ vars.NEXT_PUBLIC_SEARCH_API_KEY }}
            NEXT_PUBLIC_INDEX_NAME=${{ vars.NEXT_PUBLIC_INDEX_NAME }}
            GIT_SHA=${{ github.sha }}

  # ── Deploy ───────────────────────────────────────────────────────────────
  # Railway services have GHCR image auto-updates enabled, but the poll can lag
  # 10+ min after a push. This job nudges Railway to pull the freshly-published
  # :latest immediately via `railway redeploy --from-source` (the flag that
  # re-pulls the configured image instead of restarting the old digest). Auto-
  # update stays on as the fallback. Requires a RAILWAY_TOKEN repo secret (a
  # Railway *project* token scoped to the production environment — Project →
  # Settings → Tokens). If the secret is absent, the job no-ops with a warning
  # and the auto-update poll still deploys (just slower).
  deploy:
    name: Force Railway redeploy
    needs: [changes, backend-image, storefront-image]
    # Runs if EITHER image job published (the other may be skipped for a single-app
    # change). Only redeploys the service(s) whose image was rebuilt.
    if: >-
      always() && github.event_name == 'push' && github.ref == 'refs/heads/master'
      && (needs.backend-image.result == 'success' || needs.storefront-image.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # RAILWAY_TOKEN lives as a secret on this GitHub Environment (no protection
    # rules), so the job must declare it to resolve the secret.
    environment: "scintillating-adaptation / production"
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      DEPLOY_BACKEND: ${{ needs.changes.outputs.backend }}
      DEPLOY_STOREFRONT: ${{ needs.changes.outputs.storefront }}
    steps:
      - name: Redeploy changed services (pull freshly-pushed :latest)
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN not set — skipping force-deploy. Railway image auto-update will pull the new :latest on its next poll (slower)."
            exit 0
          fi
          npm install -g @railway/cli
          svcs=()
          [ "$DEPLOY_BACKEND" = "true" ] && svcs+=("${{ vars.RAILWAY_BACKEND_SERVICE }}")
          [ "$DEPLOY_STOREFRONT" = "true" ] && svcs+=("${{ vars.RAILWAY_STOREFRONT_SERVICE }}")
          for svc in "${svcs[@]}"; do
            echo "Redeploying $svc from configured image source…"
            railway redeploy --service "$svc" --from-source -y
          done

      - name: Wait until prod reports the new commit
        env:
          GIT_SHA: ${{ github.sha }}
          BACKEND_URL: ${{ vars.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
          STOREFRONT_URL: ${{ vars.NEXT_PUBLIC_BASE_URL }}
        run: |
          poll() {
            url="$1"; label="$2"
            echo "Waiting for $label to report ${GIT_SHA} ($url)…"
            for i in $(seq 1 72); do
              live=$(curl -fsS -A "Mozilla/5.0" -H "Cache-Control: no-cache" "$url?cb=$i" 2>/dev/null \
                | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
              if [ "$live" = "$GIT_SHA" ]; then echo "✓ $label live ($live)"; return 0; fi
              echo "  [$i/72] $label sha=${live:-<none>} — retry in 15s"
              sleep 15
            done
            echo "::error::$label never reported $GIT_SHA — deploy not live in time"
            return 1
          }
          [ "$DEPLOY_BACKEND" = "true" ] && poll "$BACKEND_URL/version" backend
          [ "$DEPLOY_STOREFRONT" = "true" ] && poll "$STOREFRONT_URL/api/healthcheck" storefront
          echo "Prod is serving ${GIT_SHA}."

  # ── Production e2e (post-deploy) ───────────────────────────────────────────
  # Runs only after `deploy` confirmed the new commit is live on prod. Strictly
  # read-only against production data (navigation + render assertions; never
  # creates carts/accounts/orders). Authenticates through the pre-launch access
  # gate with STOREFRONT_ACCESS_TOKEN.
  e2e-prod:
    name: Production e2e (post-deploy)
    needs: [changes, deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: storefront/pnpm-lock.yaml

      - name: Install storefront deps
        working-directory: storefront
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: storefront
        run: pnpm exec playwright install --with-deps chromium

      - name: Run read-only prod e2e
        working-directory: storefront
        env:
          NEXT_PUBLIC_BASE_URL: ${{ vars.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${{ vars.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
          NEXT_PUBLIC_DEFAULT_REGION: ${{ vars.NEXT_PUBLIC_DEFAULT_REGION }}
          STOREFRONT_ACCESS_TOKEN: ${{ secrets.STOREFRONT_ACCESS_TOKEN }}
        run: pnpm test-e2e:prod

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: prod-playwright-report
          path: storefront/playwright-report
          retention-days: 7
